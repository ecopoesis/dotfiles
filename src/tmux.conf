# Default termtype. If the rcfile sets $TERM, that overrides this value.
set -g default-terminal tmux-256color
set-option -ga terminal-overrides ",xterm-ghostty:Tc,xterm-256color:Tc"
set -as terminal-features ',xterm-ghostty:hyperlinks'
set -g allow-passthrough on

# Ring the bell if any background window rang a bell
set -g bell-action any

# Watch for activity in background windows
setw -g monitor-activity on

# scrollback size
set -g history-limit 10000

# pass through xterm keys
set -g xterm-keys on

# Enable extended keys (kitty keyboard protocol) so Shift+Enter
# sends a distinct sequence that apps like Claude Code can recognize
set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features 'xterm-ghostty:extkeys'

# Redraw the client (if interrupted by wall, etc)
bind R refresh-client

# mouse mode
is_older="[[ $(tmux -V | cut -d' ' -f2) -lt 2.1 ]] && true || false"
if-shell "$is_older" "set -g mode-mouse on; set -g mouse-resize-pane on;\
  set -g mouse-select-pane on; set -g mouse-select-window on" "set -g mouse on"

# behave like screen
set-option -g prefix C-a
set-option -g prefix2 C-b

# send the same key to all panes
bind S set-window-option synchronize-panes

# open URLs from the current pane
bind U run-shell -b "tmux capture-pane -J -p | grep -oE '(https?://)[^ ]+' | sort -u | fzf-tmux -d 20 --multi --bind 'enter:become(open {+})'"
bind u run-shell -b "tmux capture-pane -J -p | grep -oE '(https?://)[^ ]+' | sort -u | fzf-tmux -d 20 --multi --bind 'enter:become(open {+})'"

#set-option -g remain-on-exit on

source-file "${HOME}/.tmux/red.tmuxtheme"
